name: Build Store and Deploy Server
on: [push, workflow_dispatch]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller customtkinter cryptography

    - name: Build Store EXE
      run: |
        pyinstaller --noconsole --onefile main.py

    - name: Build Keygen EXE
      run: |
        pyinstaller --noconsole --onefile keygen.py

    - name: Upload Store Artifact
      uses: actions/upload-artifact@v4
      with:
        name: App-Store-EXE
        path: dist/main.exe

    - name: Upload Keygen Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Key-Generator-EXE
        path: dist/keygen.exe

  deploy-server:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4
